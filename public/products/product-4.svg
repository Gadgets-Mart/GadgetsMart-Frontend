<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3a3a3c"/><stop offset="100%" stop-color="#242426"/></linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0.2" y2="1"><stop offset="0%" stop-color="#1c2840"/><stop offset="100%" stop-color="#080c1a"/></linearGradient>
    <filter id="ds"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.65"/></filter>
  </defs>
  <!-- Lenovo Tab P12 Pro - landscape, 12.6" AMOLED -->
  <rect x="40" y="80" width="320" height="240" rx="14" fill="url(#body)" filter="url(#ds)"/>
  <!-- JBL speaker grilles left edge -->
  <rect x="44" y="96" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="44" y="114" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="44" y="132" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="44" y="150" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="44" y="168" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="44" y="186" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="44" y="204" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="44" y="222" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <!-- JBL speakers right edge -->
  <rect x="350" y="96" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="350" y="114" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="350" y="132" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="350" y="150" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="350" y="168" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="350" y="186" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="350" y="204" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <rect x="350" y="222" width="6" height="12" rx="3" fill="#1a1a1c"/>
  <!-- Power/volume top -->
  <rect x="100" y="76" width="22" height="6" rx="3" fill="#2a2a2c"/>
  <rect x="130" y="76" width="14" height="6" rx="3" fill="#2a2a2c"/>
  <!-- Screen bezel -->
  <rect x="52" y="88" width="296" height="224" rx="6" fill="#0e0e10"/>
  <!-- AMOLED screen -->
  <rect x="56" y="92" width="288" height="216" rx="5" fill="url(#scr)"/>
  <!-- Front camera punch hole - landscape top right -->
  <circle cx="330" cy="108" r="4.5" fill="#0e0e10"/>
  <circle cx="330" cy="108" r="2.8" fill="#151517"/>
  <!-- Content on screen -->
  <rect x="64" y="100" width="272" height="120" rx="6" fill="rgba(0,80,160,0.15)"/>
  <rect x="70" y="108" width="120" height="70" rx="5" fill="rgba(255,255,255,0.05)"/>
  <rect x="196" y="108" width="134" height="70" rx="5" fill="rgba(255,255,255,0.04)"/>
  <!-- Bottom navigation Android -->
  <rect x="56" y="270" width="288" height="38" rx="5" fill="#141416"/>
  <circle cx="164" cy="289" r="8" fill="rgba(255,255,255,0.12)"/>
  <rect x="196" y="283" width="8" height="12" rx="2" fill="rgba(255,255,255,0.15)"/>
  <path d="M224 295 L240 295 L232 281 Z" fill="rgba(255,255,255,0.12)"/>
  <!-- Lenovo logo on back edge (visible at bottom of device) -->
  <text x="200" y="315" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.28)" font-family="sans-serif" letter-spacing="2">LENOVO</text>
  <!-- Highlight -->
  <rect x="40" y="80" width="320" height="25" rx="14" fill="rgba(255,255,255,0.05)"/>
  <rect x="40" y="80" width="18" height="240" rx="14" fill="rgba(255,255,255,0.04)"/>
</svg>
