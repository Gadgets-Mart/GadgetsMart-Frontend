<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a1e"/><stop offset="100%" stop-color="#0e0e10"/></linearGradient>
    <radialGradient id="rgbglow" cx="50%" cy="70%" r="60%"><stop offset="0%" stop-color="#00d464" stop-opacity="0.3"/><stop offset="100%" stop-color="#00d464" stop-opacity="0"/></radialGradient>
    <filter id="ds"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.7"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Razer DeathAdder V3 - top-down view, lightweight -->
  <!-- RGB underglow -->
  <ellipse cx="200" cy="220" rx="118" ry="145" fill="url(#rgbglow)"/>
  <!-- Main body shape - classic DeathAdder asymmetric ergonomic -->
  <path d="M140 108 Q155 95 200 92 Q240 90 258 100 Q285 116 292 155 Q302 200 296 260 Q288 315 264 340 Q245 358 208 360 Q180 362 162 348 Q140 330 130 295 Q118 258 120 210 Q120 158 140 108 Z" fill="url(#body)" filter="url(#ds)"/>
  <!-- Left click -->
  <path d="M140 108 Q155 95 200 92 L200 192 Q175 196 148 186 Q132 178 130 155 Z" fill="#1e1e22"/>
  <!-- Right click -->
  <path d="M200 92 Q240 90 258 100 Q285 116 292 155 Q295 175 286 192 L200 192 Z" fill="#161618"/>
  <!-- Click divider -->
  <line x1="200" y1="92" x2="200" y2="192" stroke="#0a0a0c" stroke-width="2.5"/>
  <!-- Scroll wheel (Razer optical) -->
  <ellipse cx="200" cy="160" rx="14" ry="20" fill="#1e1e22"/>
  <ellipse cx="200" cy="160" rx="11" ry="16" fill="#00d464" opacity="0.7" filter="url(#glow)"/>
  <!-- Wheel ridges -->
  <g stroke="#008840" stroke-width="1.5" opacity="0.6">
    <line x1="189" y1="148" x2="211" y2="148"/>
    <line x1="189" y1="154" x2="211" y2="154"/>
    <line x1="189" y1="160" x2="211" y2="160"/>
    <line x1="189" y1="166" x2="211" y2="166"/>
    <line x1="189" y1="172" x2="211" y2="172"/>
  </g>
  <!-- Honeycomb lightweight holes pattern -->
  <g fill="none" stroke="#0a0a0c" stroke-width="1" opacity="0.5">
    <!-- Honeycomb grid -->
    <polygon points="170,230 178,225 186,230 186,240 178,245 170,240"/>
    <polygon points="186,230 194,225 202,230 202,240 194,245 186,240"/>
    <polygon points="202,230 210,225 218,230 218,240 210,245 202,240"/>
    <polygon points="218,230 226,225 234,230 234,240 226,245 218,240"/>
    <polygon points="170,250 178,245 186,250 186,260 178,265 170,260"/>
    <polygon points="186,250 194,245 202,250 202,260 194,265 186,260"/>
    <polygon points="202,250 210,245 218,250 218,260 210,265 202,260"/>
    <polygon points="218,250 226,245 234,250 234,260 226,265 218,260"/>
    <polygon points="178,270 186,265 194,270 194,280 186,285 178,280"/>
    <polygon points="194,270 202,265 210,270 210,280 202,285 194,280"/>
    <polygon points="210,270 218,265 226,270 226,280 218,285 210,280"/>
  </g>
  <!-- Side button (thumb) -->
  <rect x="122" y="222" width="8" height="20" rx="3" fill="#2a2a2e"/>
  <rect x="122" y="248" width="8" height="16" rx="3" fill="#2a2a2e"/>
  <!-- Razer logo (simplified 3 snakes / triangle) -->
  <path d="M195 310 L205 310 L205 318 L200 322 L195 318 Z" fill="#00d464" opacity="0.6" filter="url(#glow)"/>
  <text x="200" y="340" font-size="9" text-anchor="middle" fill="#00d464" opacity="0.5" font-family="sans-serif" letter-spacing="2">RAZER</text>
  <!-- RGB strip at bottom -->
  <path d="M150 348 Q175 352 200 352 Q225 352 250 348" stroke="#00d464" stroke-width="3" fill="none" opacity="0.6" filter="url(#glow)"/>
  <!-- Body highlight -->
  <path d="M152 104 Q172 94 200 92 Q200 115 178 126 Q160 135 150 124 Z" fill="rgba(255,255,255,0.06)"/>
</svg>
