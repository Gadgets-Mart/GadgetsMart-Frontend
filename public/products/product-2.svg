<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2e2e30"/><stop offset="100%" stop-color="#1a1a1c"/></linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0%" stop-color="#1a2840"/><stop offset="100%" stop-color="#080e1c"/></linearGradient>
    <radialGradient id="amoled" cx="60%" cy="35%" r="50%"><stop offset="0%" stop-color="#004466" stop-opacity="0.5"/><stop offset="100%" stop-color="#080e1c" stop-opacity="0"/></radialGradient>
    <filter id="ds"><feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.65"/></filter>
  </defs>
  <!-- Samsung Galaxy Tab S9 - portrait, 11" -->
  <rect x="112" y="28" width="176" height="344" rx="18" fill="url(#body)" filter="url(#ds)"/>
  <!-- S-Pen slot on right edge -->
  <rect x="286" y="100" width="5" height="120" rx="2" fill="#1a1a1c"/>
  <rect x="287" y="110" width="3" height="100" rx="1.5" fill="#111113"/>
  <!-- Screen bezel -->
  <rect x="119" y="44" width="162" height="312" rx="5" fill="#0c0c0e"/>
  <!-- Screen -->
  <rect x="122" y="47" width="156" height="306" rx="4" fill="url(#scr)"/>
  <rect x="122" y="47" width="156" height="306" rx="4" fill="url(#amoled)"/>
  <!-- Android-style status bar -->
  <rect x="130" y="53" width="18" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="248" y="52" width="22" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
  <!-- Dynamic AMOLED wallpaper waves -->
  <ellipse cx="200" cy="180" rx="90" ry="90" fill="rgba(0,120,200,0.08)"/>
  <ellipse cx="200" cy="180" rx="60" ry="60" fill="rgba(0,140,220,0.07)"/>
  <!-- App drawer grid -->
  <rect x="130" y="68" width="28" height="28" rx="14" fill="#2196F3" opacity="0.9"/>
  <rect x="164" y="68" width="28" height="28" rx="14" fill="#4CAF50" opacity="0.9"/>
  <rect x="198" y="68" width="28" height="28" rx="14" fill="#FF5722" opacity="0.9"/>
  <rect x="232" y="68" width="28" height="28" rx="14" fill="#9C27B0" opacity="0.9"/>
  <rect x="130" y="102" width="28" height="28" rx="14" fill="#00BCD4" opacity="0.9"/>
  <rect x="164" y="102" width="28" height="28" rx="14" fill="#FFC107" opacity="0.9"/>
  <rect x="198" y="102" width="28" height="28" rx="14" fill="#E91E63" opacity="0.9"/>
  <rect x="232" y="102" width="28" height="28" rx="14" fill="#8BC34A" opacity="0.9"/>
  <!-- Content area -->
  <rect x="128" y="142" width="144" height="130" rx="10" fill="rgba(255,255,255,0.04)"/>
  <rect x="134" y="150" width="132" height="70" rx="6" fill="rgba(0,100,200,0.12)"/>
  <rect x="134" y="226" width="132" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="134" y="240" width="90" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <!-- Samsung keyboard bar -->
  <rect x="128" y="284" width="144" height="60" rx="8" fill="rgba(255,255,255,0.04)"/>
  <rect x="134" y="292" width="20" height="16" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="158" y="292" width="20" height="16" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="182" y="292" width="20" height="16" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="206" y="292" width="20" height="16" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="230" y="292" width="32" height="16" rx="3" fill="rgba(255,255,255,0.08)"/>
  <!-- Samsung nav bar -->
  <rect x="150" y="342" width="16" height="16" rx="8" fill="rgba(255,255,255,0.2)" opacity="0.5"/>
  <rect x="192" y="342" width="16" height="16" rx="3" fill="rgba(255,255,255,0.2)" opacity="0.5"/>
  <path d="M228 342 L244 342 L236 358 Z" fill="rgba(255,255,255,0.2)" opacity="0.5"/>
  <!-- Front camera (punch hole) -->
  <circle cx="200" cy="38" r="5" fill="#0c0c0e"/>
  <circle cx="200" cy="38" r="3.5" fill="#101012"/>
  <circle cx="199" cy="37" r="1.2" fill="#1a1a1c"/>
  <!-- Volume buttons left -->
  <rect x="109" y="106" width="5" height="22" rx="2.5" fill="#222224"/>
  <rect x="109" y="136" width="5" height="22" rx="2.5" fill="#222224"/>
  <!-- Power right -->
  <rect x="286" y="70" width="5" height="28" rx="2.5" fill="#222224"/>
  <!-- USB-C bottom -->
  <rect x="188" y="369" width="24" height="7" rx="3.5" fill="#0c0c0e"/>
  <!-- Samsung logo -->
  <text x="200" y="385" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="sans-serif" letter-spacing="2">SAMSUNG</text>
  <!-- Highlight -->
  <path d="M122 47 Q145 50 160 65 L155 90 Q140 73 122 70 Z" fill="rgba(255,255,255,0.035)"/>
</svg>
