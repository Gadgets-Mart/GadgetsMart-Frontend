<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="lid" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e2e5e"/><stop offset="100%" stop-color="#0a1228"/></linearGradient>
    <linearGradient id="base" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#2a2a2e"/><stop offset="100%" stop-color="#3a3a3e"/></linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#141a2e"/><stop offset="100%" stop-color="#040608"/></linearGradient>
    <filter id="ds"><feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000" flood-opacity="0.75"/></filter>
  </defs>
  <!-- ASUS ZenBook 14 OLED - Ponder Blue lid -->
  <!-- Lid -->
  <rect x="62" y="28" width="276" height="188" rx="6" fill="url(#lid)" filter="url(#ds)"/>
  <!-- ZenBook concentric circle rings (signature design) on lid back -->
  <circle cx="200" cy="122" r="75" fill="none" stroke="rgba(100,150,255,0.12)" stroke-width="1.5"/>
  <circle cx="200" cy="122" r="60" fill="none" stroke="rgba(100,150,255,0.1)" stroke-width="1.5"/>
  <circle cx="200" cy="122" r="45" fill="none" stroke="rgba(120,170,255,0.09)" stroke-width="1.5"/>
  <circle cx="200" cy="122" r="30" fill="none" stroke="rgba(140,180,255,0.08)" stroke-width="1.5"/>
  <circle cx="200" cy="122" r="15" fill="none" stroke="rgba(160,200,255,0.07)" stroke-width="1.5"/>
  <!-- ASUS logo on lid -->
  <text x="200" y="128" font-size="11" text-anchor="middle" fill="rgba(180,210,255,0.3)" font-family="sans-serif" font-weight="bold" letter-spacing="2">ASUS</text>
  <!-- Screen bezel -->
  <rect x="68" y="34" width="264" height="178" rx="4" fill="#0e0e10"/>
  <!-- OLED screen -->
  <rect x="72" y="38" width="256" height="170" rx="3" fill="url(#scr)"/>
  <!-- Menu bar -->
  <rect x="72" y="38" width="256" height="16" rx="3 3 0 0" fill="#141426"/>
  <!-- Desktop content -->
  <rect x="78" y="58" width="244" height="80" rx="4" fill="rgba(30,50,120,0.2)"/>
  <rect x="78" y="144" width="116" height="56" rx="4" fill="rgba(255,255,255,0.03)"/>
  <rect x="200" y="144" width="122" height="56" rx="4" fill="rgba(255,255,255,0.03)"/>
  <!-- Taskbar -->
  <rect x="72" y="192" width="256" height="16" rx="0 0 3 3" fill="#1a1a28"/>
  <!-- Webcam -->
  <circle cx="200" cy="31" r="2.5" fill="#0e0e10"/>
  <!-- Hinge (ErgoLift) -->
  <rect x="62" y="214" width="276" height="6" rx="2" fill="#2a2a30"/>
  <!-- Base (Jasper Gray) -->
  <rect x="52" y="220" width="296" height="112" rx="6" fill="url(#base)" filter="url(#ds)"/>
  <!-- Keyboard -->
  <rect x="70" y="228" width="218" height="74" rx="3" fill="#242428"/>
  <g fill="#3a3a3e" opacity="0.9">
    <rect x="76" y="232" width="9" height="7" rx="1.5"/>
    <rect x="88" y="232" width="9" height="7" rx="1.5"/>
    <rect x="100" y="232" width="9" height="7" rx="1.5"/>
    <rect x="112" y="232" width="9" height="7" rx="1.5"/>
    <rect x="124" y="232" width="9" height="7" rx="1.5"/>
    <rect x="136" y="232" width="9" height="7" rx="1.5"/>
    <rect x="148" y="232" width="9" height="7" rx="1.5"/>
    <rect x="160" y="232" width="9" height="7" rx="1.5"/>
    <rect x="172" y="232" width="9" height="7" rx="1.5"/>
    <rect x="184" y="232" width="9" height="7" rx="1.5"/>
    <rect x="196" y="232" width="9" height="7" rx="1.5"/>
    <rect x="208" y="232" width="9" height="7" rx="1.5"/>
    <rect x="220" y="232" width="9" height="7" rx="1.5"/>
    <rect x="76" y="243" width="9" height="7" rx="1.5"/>
    <rect x="88" y="243" width="9" height="7" rx="1.5"/>
    <rect x="100" y="243" width="9" height="7" rx="1.5"/>
    <rect x="112" y="243" width="9" height="7" rx="1.5"/>
    <rect x="124" y="243" width="9" height="7" rx="1.5"/>
    <rect x="136" y="243" width="9" height="7" rx="1.5"/>
    <rect x="148" y="243" width="9" height="7" rx="1.5"/>
    <rect x="160" y="243" width="9" height="7" rx="1.5"/>
    <rect x="172" y="243" width="9" height="7" rx="1.5"/>
    <rect x="184" y="243" width="9" height="7" rx="1.5"/>
    <rect x="196" y="243" width="9" height="7" rx="1.5"/>
    <rect x="208" y="243" width="9" height="7" rx="1.5"/>
    <rect x="76" y="265" width="9" height="7" rx="1.5"/>
    <rect x="88" y="265" width="9" height="7" rx="1.5"/>
    <rect x="118" y="268" width="92" height="9" rx="2"/>
  </g>
  <!-- NumberPad (ZenBook signature) -->
  <rect x="252" y="228" width="30" height="68" rx="3" fill="#2c2c32"/>
  <g fill="#3e3e44" opacity="0.8">
    <rect x="256" y="232" width="7" height="6" rx="1"/>
    <rect x="267" y="232" width="7" height="6" rx="1"/>
    <rect x="256" y="242" width="7" height="6" rx="1"/>
    <rect x="267" y="242" width="7" height="6" rx="1"/>
    <rect x="256" y="252" width="7" height="6" rx="1"/>
    <rect x="267" y="252" width="7" height="6" rx="1"/>
    <rect x="256" y="262" width="18" height="6" rx="1"/>
    <rect x="256" y="272" width="7" height="6" rx="1"/>
    <rect x="267" y="272" width="7" height="6" rx="1"/>
    <rect x="256" y="282" width="7" height="6" rx="1"/>
    <rect x="267" y="282" width="7" height="6" rx="1"/>
  </g>
  <!-- Trackpad -->
  <rect x="150" y="298" width="100" height="56" rx="4" fill="#1e1e22"/>
  <!-- Highlight lid -->
  <path d="M62 28 Q100 31 160 40 L160 50 Q100 40 62 37 Z" fill="rgba(100,150,255,0.07)"/>
</svg>
