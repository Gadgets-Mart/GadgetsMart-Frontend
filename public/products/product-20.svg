<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e1c1a"/><stop offset="100%" stop-color="#0e0c0a"/></linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a2826"/><stop offset="100%" stop-color="#1c1a18"/></linearGradient>
    <linearGradient id="knob" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#d4a830"/><stop offset="50%" stop-color="#c8982a"/><stop offset="100%" stop-color="#906820"/></linearGradient>
    <radialGradient id="knobshine" cx="35%" cy="30%" r="55%"><stop offset="0%" stop-color="rgba(255,220,80,0.6)"/><stop offset="100%" stop-color="rgba(255,220,80,0)"/></radialGradient>
    <filter id="ds"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.7"/></filter>
  </defs>
  <!-- Marshall Stanmore III - retro amplifier-style speaker -->
  <!-- Main body box (lacquered wood) -->
  <rect x="62" y="82" width="276" height="236" rx="6" fill="url(#body)" filter="url(#ds)"/>
  <!-- Gold corner trim screws -->
  <circle cx="74" cy="94" r="5" fill="url(#knob)"/>
  <circle cx="326" cy="94" r="5" fill="url(#knob)"/>
  <circle cx="74" cy="306" r="5" fill="url(#knob)"/>
  <circle cx="326" cy="306" r="5" fill="url(#knob)"/>
  <!-- Top panel -->
  <rect x="62" y="82" width="276" height="38" rx="6" fill="url(#top)"/>
  <!-- Top gold accent strip -->
  <rect x="62" y="118" width="276" height="3" fill="#c89820" opacity="0.7"/>
  <!-- Knob panel area (top) -->
  <rect x="70" y="88" width="260" height="26" rx="3" fill="rgba(0,0,0,0.2)"/>
  <!-- Three gold knobs (VOL, BASS, TREB) - the Marshall signature -->
  <!-- VOL knob (left) -->
  <circle cx="135" cy="101" r="16" fill="url(#knob)"/>
  <circle cx="135" cy="101" r="16" fill="url(#knobshine)"/>
  <circle cx="135" cy="101" r="11" fill="#a87820"/>
  <circle cx="135" cy="101" r="4" fill="#c89828"/>
  <line x1="135" y1="88" x2="135" y2="97" stroke="#f0d060" stroke-width="2" stroke-linecap="round"/>
  <text x="135" y="122" font-size="7" text-anchor="middle" fill="rgba(255,220,80,0.7)" font-family="sans-serif" letter-spacing="1">VOL</text>
  <!-- BASS knob (center) -->
  <circle cx="200" cy="101" r="16" fill="url(#knob)"/>
  <circle cx="200" cy="101" r="16" fill="url(#knobshine)"/>
  <circle cx="200" cy="101" r="11" fill="#a87820"/>
  <circle cx="200" cy="101" r="4" fill="#c89828"/>
  <line x1="200" y1="88" x2="200" y2="97" stroke="#f0d060" stroke-width="2" stroke-linecap="round"/>
  <text x="200" y="122" font-size="7" text-anchor="middle" fill="rgba(255,220,80,0.7)" font-family="sans-serif" letter-spacing="1">BASS</text>
  <!-- TREB knob (right) -->
  <circle cx="265" cy="101" r="16" fill="url(#knob)"/>
  <circle cx="265" cy="101" r="16" fill="url(#knobshine)"/>
  <circle cx="265" cy="101" r="11" fill="#a87820"/>
  <circle cx="265" cy="101" r="4" fill="#c89828"/>
  <line x1="265" y1="88" x2="265" y2="97" stroke="#f0d060" stroke-width="2" stroke-linecap="round"/>
  <text x="265" y="122" font-size="7" text-anchor="middle" fill="rgba(255,220,80,0.7)" font-family="sans-serif" letter-spacing="1">TREB</text>
  <!-- Speaker grille (fabric, dark) -->
  <rect x="70" y="124" width="260" height="162" rx="3" fill="#141210"/>
  <!-- Grille fabric texture (diamond pattern) -->
  <g stroke="rgba(80,60,40,0.3)" stroke-width="0.8">
    <line x1="70" y1="130" x2="330" y2="130"/>
    <line x1="70" y1="137" x2="330" y2="137"/>
    <line x1="70" y1="144" x2="330" y2="144"/>
    <line x1="70" y1="151" x2="330" y2="151"/>
    <line x1="70" y1="158" x2="330" y2="158"/>
    <line x1="70" y1="165" x2="330" y2="165"/>
    <line x1="70" y1="172" x2="330" y2="172"/>
    <line x1="70" y1="179" x2="330" y2="179"/>
    <line x1="70" y1="186" x2="330" y2="186"/>
    <line x1="70" y1="193" x2="330" y2="193"/>
    <line x1="70" y1="200" x2="330" y2="200"/>
    <line x1="70" y1="207" x2="330" y2="207"/>
    <line x1="70" y1="214" x2="330" y2="214"/>
    <line x1="70" y1="221" x2="330" y2="221"/>
    <line x1="70" y1="228" x2="330" y2="228"/>
    <line x1="70" y1="235" x2="330" y2="235"/>
    <line x1="70" y1="242" x2="330" y2="242"/>
    <line x1="70" y1="249" x2="330" y2="249"/>
    <line x1="70" y1="256" x2="330" y2="256"/>
    <line x1="70" y1="263" x2="330" y2="263"/>
    <line x1="70" y1="270" x2="330" y2="270"/>
    <line x1="70" y1="277" x2="330" y2="277"/>
    <line x1="70" y1="284" x2="330" y2="284"/>
  </g>
  <!-- Grille vertical columns -->
  <g stroke="rgba(80,60,40,0.25)" stroke-width="0.8">
    <line x1="80" y1="124" x2="80" y2="286"/>
    <line x1="100" y1="124" x2="100" y2="286"/>
    <line x1="120" y1="124" x2="120" y2="286"/>
    <line x1="140" y1="124" x2="140" y2="286"/>
    <line x1="160" y1="124" x2="160" y2="286"/>
    <line x1="180" y1="124" x2="180" y2="286"/>
    <line x1="200" y1="124" x2="200" y2="286"/>
    <line x1="220" y1="124" x2="220" y2="286"/>
    <line x1="240" y1="124" x2="240" y2="286"/>
    <line x1="260" y1="124" x2="260" y2="286"/>
    <line x1="280" y1="124" x2="280" y2="286"/>
    <line x1="300" y1="124" x2="300" y2="286"/>
    <line x1="320" y1="124" x2="320" y2="286"/>
  </g>
  <!-- Marshall gold script logo (the signature) -->
  <text x="200" y="220" font-size="32" text-anchor="middle" fill="rgba(212,168,48,0.85)" font-family="Georgia, serif" font-style="italic" font-weight="bold" letter-spacing="1">Marshall</text>
  <!-- Bottom trim / rubber feet -->
  <rect x="62" y="296" width="276" height="22" rx="6" fill="#1a1816"/>
  <rect x="62" y="296" width="276" height="4" fill="#c89820" opacity="0.5"/>
  <!-- Rubber feet -->
  <rect x="80" y="316" width="28" height="6" rx="3" fill="#0a0a08"/>
  <rect x="292" y="316" width="28" height="6" rx="3" fill="#0a0a08"/>
  <!-- Input ports at back (visible on bottom edge) -->
  <rect x="140" y="314" width="8" height="5" rx="2" fill="#0e0e0c"/>
  <rect x="155" y="314" width="8" height="5" rx="2" fill="#0e0e0c"/>
  <!-- Body highlight top-left -->
  <path d="M62 82 Q100 84 160 90 L160 98 Q100 92 62 90 Z" fill="rgba(255,255,255,0.04)"/>
</svg>
