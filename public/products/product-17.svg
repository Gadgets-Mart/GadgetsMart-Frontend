<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0033cc"/><stop offset="50%" stop-color="#0044dd"/><stop offset="100%" stop-color="#002299"/></linearGradient>
    <linearGradient id="end" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a1c"/><stop offset="100%" stop-color="#0a0a0c"/></linearGradient>
    <radialGradient id="rad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#333336"/><stop offset="100%" stop-color="#111113"/></radialGradient>
    <filter id="ds"><feDropShadow dx="4" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.7"/></filter>
  </defs>
  <!-- JBL Flip 6 - horizontal cylinder, blue -->
  <!-- Left passive radiator (end cap) -->
  <ellipse cx="78" cy="200" rx="22" ry="56" fill="url(#end)" filter="url(#ds)"/>
  <ellipse cx="78" cy="200" rx="18" ry="50" fill="url(#rad)"/>
  <!-- Passive radiator cone rings -->
  <ellipse cx="78" cy="200" rx="14" ry="42" fill="none" stroke="#2a2a2c" stroke-width="2"/>
  <ellipse cx="78" cy="200" rx="10" ry="34" fill="none" stroke="#222224" stroke-width="1.5"/>
  <ellipse cx="78" cy="200" rx="6" ry="24" fill="none" stroke="#1e1e20" stroke-width="1.5"/>
  <!-- Main cylindrical body -->
  <rect x="76" y="144" width="248" height="112" rx="0" fill="url(#body)" filter="url(#ds)"/>
  <!-- Top arc of cylinder -->
  <ellipse cx="200" cy="144" rx="124" ry="20" fill="#0044dd"/>
  <!-- Bottom arc -->
  <ellipse cx="200" cy="256" rx="124" ry="20" fill="#002299"/>
  <!-- Fabric mesh texture (horizontal lines pattern) -->
  <g stroke="rgba(0,0,80,0.3)" stroke-width="1.5">
    <line x1="76" y1="152" x2="324" y2="152"/>
    <line x1="76" y1="159" x2="324" y2="159"/>
    <line x1="76" y1="166" x2="324" y2="166"/>
    <line x1="76" y1="173" x2="324" y2="173"/>
    <line x1="76" y1="180" x2="324" y2="180"/>
    <line x1="76" y1="187" x2="324" y2="187"/>
    <line x1="76" y1="194" x2="324" y2="194"/>
    <line x1="76" y1="201" x2="324" y2="201"/>
    <line x1="76" y1="208" x2="324" y2="208"/>
    <line x1="76" y1="215" x2="324" y2="215"/>
    <line x1="76" y1="222" x2="324" y2="222"/>
    <line x1="76" y1="229" x2="324" y2="229"/>
    <line x1="76" y1="236" x2="324" y2="236"/>
    <line x1="76" y1="243" x2="324" y2="243"/>
    <line x1="76" y1="250" x2="324" y2="250"/>
  </g>
  <!-- JBL logo (centered) -->
  <text x="200" y="207" font-size="36" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="sans-serif" font-weight="bold" letter-spacing="3">JBL</text>
  <!-- Control buttons (top surface) -->
  <circle cx="264" cy="144" r="10" fill="rgba(0,0,50,0.4)"/>
  <circle cx="284" cy="144" r="10" fill="rgba(0,0,50,0.4)"/>
  <circle cx="304" cy="144" r="10" fill="rgba(0,0,50,0.4)"/>
  <!-- Buttons symbols -->
  <text x="264" y="148" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif">◀</text>
  <text x="284" y="148" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif">▶</text>
  <text x="304" y="148" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif">+</text>
  <!-- Right passive radiator end -->
  <ellipse cx="322" cy="200" rx="22" ry="56" fill="url(#end)"/>
  <ellipse cx="322" cy="200" rx="18" ry="50" fill="url(#rad)"/>
  <ellipse cx="322" cy="200" rx="14" ry="42" fill="none" stroke="#2a2a2c" stroke-width="2"/>
  <ellipse cx="322" cy="200" rx="10" ry="34" fill="none" stroke="#222224" stroke-width="1.5"/>
  <ellipse cx="322" cy="200" rx="6" ry="24" fill="none" stroke="#1e1e20" stroke-width="1.5"/>
  <!-- Wrist loop/strap -->
  <path d="M200 256 Q200 278 216 284 Q232 286 232 278 L232 256" fill="none" stroke="#0033aa" stroke-width="6" stroke-linecap="round"/>
  <!-- USB-C + power ports -->
  <rect x="188" y="256" width="10" height="5" rx="2.5" fill="rgba(0,0,80,0.5)"/>
  <!-- IP67 badge -->
  <text x="145" y="248" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif">IP67</text>
</svg>
