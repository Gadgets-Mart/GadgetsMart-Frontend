<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3a3a3c"/><stop offset="100%" stop-color="#1c1c1e"/></linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e2d50"/><stop offset="100%" stop-color="#080f20"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%"><stop offset="0%" stop-color="#2a5aaa" stop-opacity="0.5"/><stop offset="100%" stop-color="#080f20" stop-opacity="0"/></radialGradient>
    <filter id="ds"><feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.7"/></filter>
  </defs>
  <!-- iPad Pro 12.9 - portrait -->
  <rect x="108" y="20" width="184" height="360" rx="22" fill="url(#body)" filter="url(#ds)"/>
  <rect x="116" y="40" width="168" height="320" rx="5" fill="#0e0e10"/>
  <rect x="120" y="44" width="160" height="312" rx="4" fill="url(#scr)"/>
  <rect x="120" y="44" width="160" height="312" rx="4" fill="url(#glow)"/>
  <!-- Status bar -->
  <rect x="128" y="50" width="24" height="4" rx="2" fill="rgba(255,255,255,0.28)"/>
  <rect x="248" y="49" width="24" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- App grid row 1 -->
  <rect x="129" y="65" width="30" height="30" rx="8" fill="#4a90e2"/>
  <rect x="165" y="65" width="30" height="30" rx="8" fill="#5ac8fa"/>
  <rect x="201" y="65" width="30" height="30" rx="8" fill="#34c759"/>
  <rect x="237" y="65" width="30" height="30" rx="8" fill="#ff9500"/>
  <!-- App grid row 2 -->
  <rect x="129" y="102" width="30" height="30" rx="8" fill="#ff3b30"/>
  <rect x="165" y="102" width="30" height="30" rx="8" fill="#af52de"/>
  <rect x="201" y="102" width="30" height="30" rx="8" fill="#ff2d55"/>
  <rect x="237" y="102" width="30" height="30" rx="8" fill="#007aff"/>
  <!-- App grid row 3 -->
  <rect x="129" y="139" width="30" height="30" rx="8" fill="#32ade6"/>
  <rect x="165" y="139" width="30" height="30" rx="8" fill="#30b0c7"/>
  <rect x="201" y="139" width="30" height="30" rx="8" fill="#fecc02"/>
  <rect x="237" y="139" width="30" height="30" rx="8" fill="#ff6961"/>
  <!-- Content widget -->
  <rect x="125" y="182" width="150" height="100" rx="12" fill="rgba(255,255,255,0.05)"/>
  <rect x="131" y="190" width="138" height="55" rx="8" fill="rgba(80,130,220,0.18)"/>
  <rect x="131" y="252" width="138" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="131" y="266" width="90" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <!-- Widgets row -->
  <rect x="125" y="294" width="70" height="50" rx="12" fill="rgba(255,255,255,0.06)"/>
  <rect x="201" y="294" width="74" height="50" rx="12" fill="rgba(30,100,200,0.12)"/>
  <text x="160" y="325" font-size="20" text-anchor="middle" fill="rgba(255,200,50,0.7)" font-family="sans-serif">☀</text>
  <text x="238" y="325" font-size="16" text-anchor="middle" fill="rgba(100,180,255,0.7)" font-family="sans-serif">17°</text>
  <!-- Dock -->
  <rect x="127" y="352" width="146" height="36" rx="14" fill="rgba(255,255,255,0.07)"/>
  <rect x="134" y="358" width="26" height="24" rx="6" fill="rgba(255,255,255,0.13)"/>
  <rect x="166" y="358" width="26" height="24" rx="6" fill="rgba(255,255,255,0.13)"/>
  <rect x="198" y="358" width="26" height="24" rx="6" fill="rgba(255,255,255,0.13)"/>
  <rect x="230" y="358" width="26" height="24" rx="6" fill="rgba(255,255,255,0.13)"/>
  <!-- Home indicator -->
  <rect x="178" y="346" width="44" height="5" rx="2.5" fill="rgba(255,255,255,0.32)"/>
  <!-- Front camera -->
  <circle cx="200" cy="35" r="4" fill="#0a0a0c"/>
  <circle cx="200" cy="35" r="2.2" fill="#1c1c1e"/>
  <!-- Side button right -->
  <rect x="291" y="84" width="5" height="32" rx="2.5" fill="#333335"/>
  <!-- Volume left -->
  <rect x="104" y="100" width="5" height="24" rx="2.5" fill="#333335"/>
  <rect x="104" y="132" width="5" height="24" rx="2.5" fill="#333335"/>
  <!-- USB-C -->
  <rect x="185" y="376" width="30" height="7" rx="3.5" fill="#0a0a0c"/>
  <!-- Highlight -->
  <path d="M120 44 Q144 47 160 62 L154 86 Q138 70 120 67 Z" fill="rgba(255,255,255,0.04)"/>
  <!-- Apple logo on lid (back) represented as label -->
</svg>
