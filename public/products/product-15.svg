<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#686870"/><stop offset="100%" stop-color="#3a3a40"/></linearGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#58585e"/><stop offset="100%" stop-color="#2a2a2e"/></linearGradient>
    <radialGradient id="mesh" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4a4a50"/><stop offset="100%" stop-color="#303035"/></radialGradient>
    <filter id="ds"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.65"/></filter>
  </defs>
  <!-- AirPods Max - Space Gray, large circular mesh earcups, stainless steel headband -->
  <!-- Stainless steel headband (oval arch) -->
  <path d="M128 210 Q128 68 200 52 Q272 68 272 210" fill="none" stroke="url(#steel)" stroke-width="18" stroke-linecap="round" filter="url(#ds)"/>
  <!-- Headband inner (lighter steel) -->
  <path d="M134 210 Q134 76 200 60 Q266 76 266 210" fill="none" stroke="#5a5a62" stroke-width="8" stroke-linecap="round"/>
  <!-- Ear cushion mounts (the distinctive ear cup attachment arms) -->
  <rect x="117" y="190" width="18" height="44" rx="9" fill="#4a4a50"/>
  <rect x="265" y="190" width="18" height="44" rx="9" fill="#4a4a50"/>
  <!-- Mesh earcup connectors -->
  <rect x="115" y="205" width="22" height="30" rx="5" fill="#404045"/>
  <rect x="263" y="205" width="22" height="30" rx="5" fill="#404045"/>
  <!-- Left ear cup (large, circular) -->
  <circle cx="108" cy="264" r="80" fill="url(#cup)" filter="url(#ds)"/>
  <!-- Left cup outer ring (aluminum) -->
  <circle cx="108" cy="264" r="76" fill="none" stroke="#484850" stroke-width="4"/>
  <!-- Left cup mesh pattern (100 tiny dots) -->
  <circle cx="108" cy="264" r="72" fill="url(#mesh)"/>
  <!-- Mesh dot grid -->
  <g fill="#585860" opacity="0.6">
    <circle cx="88" cy="244" r="2"/><circle cx="96" cy="244" r="2"/><circle cx="104" cy="244" r="2"/><circle cx="112" cy="244" r="2"/><circle cx="120" cy="244" r="2"/><circle cx="128" cy="244" r="2"/>
    <circle cx="84" cy="252" r="2"/><circle cx="92" cy="252" r="2"/><circle cx="100" cy="252" r="2"/><circle cx="108" cy="252" r="2"/><circle cx="116" cy="252" r="2"/><circle cx="124" cy="252" r="2"/><circle cx="132" cy="252" r="2"/>
    <circle cx="80" cy="260" r="2"/><circle cx="88" cy="260" r="2"/><circle cx="96" cy="260" r="2"/><circle cx="104" cy="260" r="2"/><circle cx="112" cy="260" r="2"/><circle cx="120" cy="260" r="2"/><circle cx="128" cy="260" r="2"/><circle cx="136" cy="260" r="2"/>
    <circle cx="80" cy="268" r="2"/><circle cx="88" cy="268" r="2"/><circle cx="96" cy="268" r="2"/><circle cx="104" cy="268" r="2"/><circle cx="112" cy="268" r="2"/><circle cx="120" cy="268" r="2"/><circle cx="128" cy="268" r="2"/><circle cx="136" cy="268" r="2"/>
    <circle cx="80" cy="276" r="2"/><circle cx="88" cy="276" r="2"/><circle cx="96" cy="276" r="2"/><circle cx="104" cy="276" r="2"/><circle cx="112" cy="276" r="2"/><circle cx="120" cy="276" r="2"/><circle cx="128" cy="276" r="2"/><circle cx="136" cy="276" r="2"/>
    <circle cx="84" cy="284" r="2"/><circle cx="92" cy="284" r="2"/><circle cx="100" cy="284" r="2"/><circle cx="108" cy="284" r="2"/><circle cx="116" cy="284" r="2"/><circle cx="124" cy="284" r="2"/><circle cx="132" cy="284" r="2"/>
    <circle cx="88" cy="292" r="2"/><circle cx="96" cy="292" r="2"/><circle cx="104" cy="292" r="2"/><circle cx="112" cy="292" r="2"/><circle cx="120" cy="292" r="2"/><circle cx="128" cy="292" r="2"/>
  </g>
  <!-- Right ear cup (large, circular) -->
  <circle cx="292" cy="264" r="80" fill="url(#cup)" filter="url(#ds)"/>
  <circle cx="292" cy="264" r="76" fill="none" stroke="#484850" stroke-width="4"/>
  <circle cx="292" cy="264" r="72" fill="url(#mesh)"/>
  <!-- Right cup mesh dots -->
  <g fill="#585860" opacity="0.6">
    <circle cx="272" cy="244" r="2"/><circle cx="280" cy="244" r="2"/><circle cx="288" cy="244" r="2"/><circle cx="296" cy="244" r="2"/><circle cx="304" cy="244" r="2"/><circle cx="312" cy="244" r="2"/>
    <circle cx="268" cy="252" r="2"/><circle cx="276" cy="252" r="2"/><circle cx="284" cy="252" r="2"/><circle cx="292" cy="252" r="2"/><circle cx="300" cy="252" r="2"/><circle cx="308" cy="252" r="2"/><circle cx="316" cy="252" r="2"/>
    <circle cx="264" cy="260" r="2"/><circle cx="272" cy="260" r="2"/><circle cx="280" cy="260" r="2"/><circle cx="288" cy="260" r="2"/><circle cx="296" cy="260" r="2"/><circle cx="304" cy="260" r="2"/><circle cx="312" cy="260" r="2"/><circle cx="320" cy="260" r="2"/>
    <circle cx="264" cy="268" r="2"/><circle cx="272" cy="268" r="2"/><circle cx="280" cy="268" r="2"/><circle cx="288" cy="268" r="2"/><circle cx="296" cy="268" r="2"/><circle cx="304" cy="268" r="2"/><circle cx="312" cy="268" r="2"/><circle cx="320" cy="268" r="2"/>
    <circle cx="264" cy="276" r="2"/><circle cx="272" cy="276" r="2"/><circle cx="280" cy="276" r="2"/><circle cx="288" cy="276" r="2"/><circle cx="296" cy="276" r="2"/><circle cx="304" cy="276" r="2"/><circle cx="312" cy="276" r="2"/><circle cx="320" cy="276" r="2"/>
    <circle cx="268" cy="284" r="2"/><circle cx="276" cy="284" r="2"/><circle cx="284" cy="284" r="2"/><circle cx="292" cy="284" r="2"/><circle cx="300" cy="284" r="2"/><circle cx="308" cy="284" r="2"/><circle cx="316" cy="284" r="2"/>
    <circle cx="272" cy="292" r="2"/><circle cx="280" cy="292" r="2"/><circle cx="288" cy="292" r="2"/><circle cx="296" cy="292" r="2"/><circle cx="304" cy="292" r="2"/><circle cx="312" cy="292" r="2"/>
  </g>
  <!-- Digital Crown (right cup, distinctive cylinder button) -->
  <rect x="368" y="252" width="14" height="24" rx="7" fill="#505055"/>
  <rect x="370" y="254" width="10" height="20" rx="5" fill="#585860"/>
  <!-- Lightning/USB-C port right cup bottom -->
  <rect x="286" y="338" width="12" height="5" rx="2.5" fill="#2a2a2e"/>
  <!-- Cup highlights -->
  <circle cx="92" cy="248" r="18" fill="rgba(255,255,255,0.05)"/>
  <circle cx="276" cy="248" r="18" fill="rgba(255,255,255,0.05)"/>
  <!-- AirPods Max label -->
  <text x="200" y="378" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="sans-serif" letter-spacing="1">AirPods Max</text>
</svg>
