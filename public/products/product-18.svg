<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e1e20"/><stop offset="100%" stop-color="#0e0e10"/></linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a2a2c"/><stop offset="100%" stop-color="#1a1a1c"/></linearGradient>
    <radialGradient id="topshine" cx="50%" cy="30%" r="60%"><stop offset="0%" stop-color="rgba(255,255,255,0.1)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient>
    <filter id="ds"><feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000" flood-opacity="0.7"/></filter>
  </defs>
  <!-- Sonos One Gen 2 - vertical cylindrical smart speaker, black -->
  <!-- Speaker body (slightly tapered cylinder, wider at bottom) -->
  <path d="M138 340 Q120 340 116 310 L110 130 Q110 80 200 72 Q290 80 290 130 L284 310 Q280 340 262 340 Z" fill="url(#body)" filter="url(#ds)"/>
  <!-- Speaker fabric mesh (vertical columns) -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1.5">
    <line x1="130" y1="100" x2="122" y2="332"/>
    <line x1="145" y1="86" x2="132" y2="335"/>
    <line x1="160" y1="78" x2="142" y2="338"/>
    <line x1="175" y1="74" x2="153" y2="340"/>
    <line x1="190" y1="72" x2="164" y2="340"/>
    <line x1="200" y1="72" x2="175" y2="340"/>
    <line x1="210" y1="72" x2="186" y2="340"/>
    <line x1="225" y1="74" x2="197" y2="340"/>
    <line x1="240" y1="78" x2="210" y2="340"/>
    <line x1="255" y1="86" x2="225" y2="338"/>
    <line x1="270" y1="100" x2="240" y2="335"/>
  </g>
  <!-- Horizontal ring bands -->
  <ellipse cx="200" cy="180" rx="88" ry="12" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <ellipse cx="200" cy="240" rx="90" ry="12" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <!-- Top surface (touch controls) -->
  <ellipse cx="200" cy="112" rx="88" ry="26" fill="url(#top)"/>
  <ellipse cx="200" cy="112" rx="88" ry="26" fill="url(#topshine)"/>
  <!-- Touch control buttons on top -->
  <circle cx="170" cy="108" r="9" fill="rgba(255,255,255,0.08)"/>
  <circle cx="200" cy="105" r="11" fill="rgba(255,255,255,0.1)"/>
  <circle cx="230" cy="108" r="9" fill="rgba(255,255,255,0.08)"/>
  <!-- Volume minus -->
  <text x="170" y="112" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif">−</text>
  <!-- Play/pause -->
  <text x="200" y="110" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif">▶</text>
  <!-- Volume plus -->
  <text x="230" y="112" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif">+</text>
  <!-- Mic mute dot -->
  <circle cx="155" cy="118" r="4" fill="rgba(255,100,100,0.4)"/>
  <!-- SONOS logo -->
  <text x="200" y="215" font-size="15" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="sans-serif" letter-spacing="3">sonos</text>
  <!-- Microphone dots -->
  <g fill="rgba(255,255,255,0.2)">
    <circle cx="176" cy="88" r="2"/>
    <circle cx="184" cy="85" r="2"/>
    <circle cx="192" cy="83" r="2"/>
    <circle cx="200" cy="82" r="2"/>
    <circle cx="208" cy="83" r="2"/>
    <circle cx="216" cy="85" r="2"/>
    <circle cx="224" cy="88" r="2"/>
  </g>
  <!-- Power/Wi-Fi LED -->
  <circle cx="248" cy="120" r="3" fill="#00aa44" opacity="0.7"/>
  <!-- Bottom feet -->
  <ellipse cx="160" cy="340" rx="12" ry="4" fill="#0a0a0c"/>
  <ellipse cx="240" cy="340" rx="12" ry="4" fill="#0a0a0c"/>
  <ellipse cx="200" cy="342" rx="14" ry="4" fill="#0a0a0c"/>
  <!-- Body highlight -->
  <path d="M120 128 Q140 80 200 72 Q200 100 165 118 Q140 130 120 128 Z" fill="rgba(255,255,255,0.04)"/>
</svg>
