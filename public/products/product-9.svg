<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3e3e42"/><stop offset="100%" stop-color="#202022"/></linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4a4a4e"/><stop offset="100%" stop-color="#2a2a2e"/></linearGradient>
    <radialGradient id="scroll" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ff8c00"/><stop offset="60%" stop-color="#cc6600"/><stop offset="100%" stop-color="#884400"/></radialGradient>
    <filter id="ds"><feDropShadow dx="4" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.7"/></filter>
  </defs>
  <!-- Logitech MX Master 3S - ergonomic graphite mouse, 3/4 top-right view -->
  <!-- Main body (top view, slightly angled) -->
  <ellipse cx="200" cy="210" rx="110" ry="140" fill="url(#body)" filter="url(#ds)"/>
  <!-- Body shape refinement (ergonomic right-hand shape) -->
  <path d="M130 150 Q120 170 118 220 Q116 270 130 310 Q150 345 200 350 Q250 355 268 320 Q290 290 290 230 Q292 170 270 140 Q240 110 200 108 Q165 106 145 120 Z" fill="url(#body)" filter="url(#ds)"/>
  <!-- Left click zone -->
  <path d="M130 150 Q145 120 200 108 Q200 108 200 180 L140 185 Z" fill="#454548"/>
  <!-- Right click zone -->
  <path d="M200 108 Q240 110 270 140 Q290 170 290 190 L210 185 L200 180 Z" fill="#3e3e42"/>
  <!-- Divider line between L/R buttons -->
  <line x1="200" y1="108" x2="200" y2="185" stroke="#1a1a1c" stroke-width="2"/>
  <!-- MagSpeed scroll wheel (orange) -->
  <ellipse cx="200" cy="168" rx="16" ry="22" fill="url(#scroll)"/>
  <ellipse cx="200" cy="168" rx="14" ry="19" fill="url(#scroll)"/>
  <!-- Scroll wheel ridges -->
  <g stroke="#cc6600" stroke-width="1" opacity="0.6">
    <line x1="186" y1="155" x2="214" y2="155"/>
    <line x1="186" y1="160" x2="214" y2="160"/>
    <line x1="186" y1="165" x2="214" y2="165"/>
    <line x1="186" y1="170" x2="214" y2="170"/>
    <line x1="186" y1="175" x2="214" y2="175"/>
    <line x1="186" y1="180" x2="214" y2="180"/>
  </g>
  <!-- Secondary horizontal scroll wheel (right thumb) -->
  <ellipse cx="262" cy="240" rx="10" ry="14" fill="#555558"/>
  <g stroke="#3a3a3c" stroke-width="1" opacity="0.5">
    <line x1="252" y1="234" x2="272" y2="234"/>
    <line x1="252" y1="240" x2="272" y2="240"/>
    <line x1="252" y1="246" x2="272" y2="246"/>
  </g>
  <!-- Thumb rest side panel -->
  <path d="M120 200 Q118 180 130 165 L140 185 L132 220 L120 220 Z" fill="#505054"/>
  <!-- DPI button between scroll and thumb area -->
  <ellipse cx="200" cy="198" rx="10" ry="6" fill="#333336"/>
  <!-- USB-C port bottom -->
  <rect x="188" y="344" width="24" height="8" rx="4" fill="#1a1a1c"/>
  <!-- Logi "G" logo on body -->
  <text x="200" y="285" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-weight="bold">Logi</text>
  <!-- Bottom feet pads (subtle) -->
  <ellipse cx="160" cy="348" rx="12" ry="4" fill="rgba(255,255,255,0.05)"/>
  <ellipse cx="240" cy="348" rx="12" ry="4" fill="rgba(255,255,255,0.05)"/>
  <!-- Body highlight -->
  <path d="M148 118 Q170 108 200 108 Q200 130 180 140 Q162 148 148 140 Z" fill="rgba(255,255,255,0.07)"/>
</svg>
