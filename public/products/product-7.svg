<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="lid" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#252528"/><stop offset="100%" stop-color="#0e0e12"/></linearGradient>
    <linearGradient id="base" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#1a1a1e"/><stop offset="100%" stop-color="#2a2a2e"/></linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#181a28"/><stop offset="100%" stop-color="#060810"/></linearGradient>
    <filter id="ds"><feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000" flood-opacity="0.8"/></filter>
  </defs>
  <!-- HP Spectre x360 - Nightfall Black with gem-cut copper corners -->
  <!-- Lid -->
  <rect x="60" y="26" width="280" height="192" rx="4" fill="url(#lid)" filter="url(#ds)"/>
  <!-- Gem-cut chamfered corners (copper/gold accent lines) -->
  <line x1="60" y1="50" x2="82" y2="26" stroke="#b87333" stroke-width="2" opacity="0.8"/>
  <line x1="316" y1="26" x2="340" y2="50" stroke="#b87333" stroke-width="2" opacity="0.8"/>
  <line x1="60" y1="194" x2="82" y2="218" stroke="#b87333" stroke-width="2" opacity="0.8"/>
  <line x1="316" y1="218" x2="340" y2="194" stroke="#b87333" stroke-width="2" opacity="0.8"/>
  <!-- Corner accent diamonds -->
  <polygon points="60,50 82,26 60,26" fill="#b87333" opacity="0.4"/>
  <polygon points="316,26 340,26 340,50" fill="#b87333" opacity="0.4"/>
  <!-- Screen bezel -->
  <rect x="68" y="34" width="264" height="180" rx="3" fill="#111"/>
  <!-- Screen -->
  <rect x="72" y="38" width="256" height="172" rx="2" fill="url(#scr)"/>
  <!-- Windows UI -->
  <rect x="72" y="38" width="256" height="18" rx="2 2 0 0" fill="#1c1c2a"/>
  <rect x="82" y="44" width="8" height="8" rx="1.5" fill="#007aff" opacity="0.6"/>
  <rect x="93" y="44" width="8" height="8" rx="1.5" fill="#007aff" opacity="0.35"/>
  <rect x="82" y="52" width="8" height="8" rx="1.5" fill="#007aff" opacity="0.35"/>
  <rect x="93" y="52" width="8" height="8" rx="1.5" fill="#007aff" opacity="0.2"/>
  <!-- Desktop windows -->
  <rect x="78" y="60" width="160" height="90" rx="4" fill="rgba(255,255,255,0.04)"/>
  <rect x="78" y="60" width="160" height="12" rx="4 4 0 0" fill="rgba(255,255,255,0.06)"/>
  <rect x="244" y="60" width="78" height="90" rx="4" fill="rgba(255,255,255,0.03)"/>
  <rect x="78" y="158" width="244" height="46" rx="4" fill="rgba(255,255,255,0.03)"/>
  <!-- HP logo on lid back -->
  <circle cx="200" cy="115" r="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="200" y="120" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.07)" font-family="sans-serif" font-weight="bold" font-style="italic">hp</text>
  <!-- Webcam -->
  <circle cx="200" cy="31" r="2.5" fill="#111"/>
  <!-- 360 hinge indicator -->
  <rect x="60" y="215" width="280" height="5" rx="2" fill="#b87333" opacity="0.4"/>
  <!-- Base -->
  <rect x="50" y="220" width="300" height="112" rx="4" fill="url(#base)" filter="url(#ds)"/>
  <!-- Keyboard -->
  <rect x="68" y="230" width="220" height="74" rx="3" fill="#1e1e22"/>
  <g fill="#333336" opacity="0.9">
    <rect x="74" y="234" width="9" height="7" rx="1"/>
    <rect x="86" y="234" width="9" height="7" rx="1"/>
    <rect x="98" y="234" width="9" height="7" rx="1"/>
    <rect x="110" y="234" width="9" height="7" rx="1"/>
    <rect x="122" y="234" width="9" height="7" rx="1"/>
    <rect x="134" y="234" width="9" height="7" rx="1"/>
    <rect x="146" y="234" width="9" height="7" rx="1"/>
    <rect x="158" y="234" width="9" height="7" rx="1"/>
    <rect x="170" y="234" width="9" height="7" rx="1"/>
    <rect x="182" y="234" width="9" height="7" rx="1"/>
    <rect x="194" y="234" width="9" height="7" rx="1"/>
    <rect x="206" y="234" width="9" height="7" rx="1"/>
    <rect x="218" y="234" width="9" height="7" rx="1"/>
    <rect x="74" y="245" width="9" height="7" rx="1"/>
    <rect x="86" y="245" width="9" height="7" rx="1"/>
    <rect x="98" y="245" width="9" height="7" rx="1"/>
    <rect x="110" y="245" width="9" height="7" rx="1"/>
    <rect x="122" y="245" width="9" height="7" rx="1"/>
    <rect x="134" y="245" width="9" height="7" rx="1"/>
    <rect x="146" y="245" width="9" height="7" rx="1"/>
    <rect x="158" y="245" width="9" height="7" rx="1"/>
    <rect x="170" y="245" width="9" height="7" rx="1"/>
    <rect x="182" y="245" width="9" height="7" rx="1"/>
    <rect x="194" y="245" width="9" height="7" rx="1"/>
    <rect x="206" y="245" width="22" height="7" rx="1"/>
    <rect x="116" y="268" width="96" height="9" rx="2"/>
  </g>
  <!-- Trackpad -->
  <rect x="152" y="298" width="96" height="58" rx="4" fill="#181818"/>
  <!-- Gem-cut corner on base -->
  <line x1="50" y1="244" x2="68" y2="220" stroke="#b87333" stroke-width="1.5" opacity="0.6"/>
  <line x1="332" y1="220" x2="350" y2="244" stroke="#b87333" stroke-width="1.5" opacity="0.6"/>
</svg>
