<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="cup" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2e2e30"/><stop offset="100%" stop-color="#141416"/></linearGradient>
    <linearGradient id="pad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#222224"/><stop offset="100%" stop-color="#0e0e10"/></linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#363636"/><stop offset="100%" stop-color="#1c1c1e"/></linearGradient>
    <filter id="ds"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.7"/></filter>
    <radialGradient id="cupshine" cx="35%" cy="30%" r="60%"><stop offset="0%" stop-color="rgba(255,255,255,0.08)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient>
  </defs>
  <!-- Sony WH-1000XM5 - front view, matte black -->
  <!-- Headband arch -->
  <path d="M108 195 Q108 80 200 64 Q292 80 292 195" fill="none" stroke="url(#band)" stroke-width="24" stroke-linecap="round" filter="url(#ds)"/>
  <!-- Headband inner line (padding) -->
  <path d="M116 195 Q116 90 200 74 Q284 90 284 195" fill="none" stroke="#2a2a2c" stroke-width="12" stroke-linecap="round"/>
  <!-- Headband center padding -->
  <path d="M165 82 Q200 70 235 82" fill="none" stroke="#1e1e20" stroke-width="16" stroke-linecap="round"/>
  <!-- Left ear cup -->
  <circle cx="112" cy="215" r="70" fill="url(#cup)" filter="url(#ds)"/>
  <circle cx="112" cy="215" r="70" fill="url(#cupshine)"/>
  <!-- Left cup - memory foam ring (outer cushion) -->
  <circle cx="112" cy="215" r="65" fill="none" stroke="#1a1a1c" stroke-width="10"/>
  <circle cx="112" cy="215" r="58" fill="#1c1c1e"/>
  <!-- Left cup grille -->
  <circle cx="112" cy="215" r="38" fill="#111113"/>
  <!-- Sony logo on left cup -->
  <text x="112" y="221" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="sans-serif" letter-spacing="2">SONY</text>
  <!-- Left cup fold joint -->
  <rect x="170" y="182" width="14" height="30" rx="7" fill="#363638"/>
  <!-- Right ear cup -->
  <circle cx="288" cy="215" r="70" fill="url(#cup)" filter="url(#ds)"/>
  <circle cx="288" cy="215" r="70" fill="url(#cupshine)"/>
  <!-- Right cup cushion ring -->
  <circle cx="288" cy="215" r="65" fill="none" stroke="#1a1a1c" stroke-width="10"/>
  <circle cx="288" cy="215" r="58" fill="#1c1c1e"/>
  <!-- Right cup grille / inner -->
  <circle cx="288" cy="215" r="38" fill="#111113"/>
  <!-- Touch sensor icon (right cup has touch controls) -->
  <text x="288" y="221" font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.08)" font-family="sans-serif">⟳</text>
  <!-- Right cup fold joint -->
  <rect x="216" y="182" width="14" height="30" rx="7" fill="#363638"/>
  <!-- Power/NC button on right cup edge -->
  <circle cx="342" cy="200" r="8" fill="#2a2a2c"/>
  <circle cx="342" cy="200" r="5" fill="#222224"/>
  <!-- USB-C port on right cup bottom -->
  <rect x="282" y="278" width="12" height="6" rx="3" fill="#111"/>
  <!-- ANC microphone dots on left cup -->
  <circle cx="82" cy="188" r="3" fill="#252526"/>
  <circle cx="82" cy="242" r="3" fill="#252526"/>
  <!-- Left cup highlight -->
  <circle cx="96" cy="198" r="22" fill="rgba(255,255,255,0.04)"/>
  <!-- Right cup highlight -->
  <circle cx="272" cy="198" r="22" fill="rgba(255,255,255,0.04)"/>
  <!-- "WH-1000XM5" model label -->
  <text x="200" y="370" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="sans-serif" letter-spacing="1">WH-1000XM5</text>
</svg>
