<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#252528"/><stop offset="100%" stop-color="#111113"/></linearGradient>
    <linearGradient id="grille" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e1e20"/><stop offset="100%" stop-color="#141416"/></linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="55%"><stop offset="0%" stop-color="rgba(255,255,255,0.1)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient>
    <filter id="ds"><feDropShadow dx="4" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.7"/></filter>
  </defs>
  <!-- Bose SoundLink Flex - portable outdoor Bluetooth speaker, IP67 -->
  <!-- Main body (rounded rectangular, slightly teardrop) -->
  <path d="M120 120 Q116 80 148 60 Q170 44 200 44 Q230 44 252 60 Q284 80 280 120 L284 280 Q284 340 200 356 Q116 340 116 280 Z" fill="url(#body)" filter="url(#ds)"/>
  <!-- Rubber bumper ring (protective) -->
  <path d="M120 120 Q116 80 148 60 Q170 44 200 44 Q230 44 252 60 Q284 80 280 120 L284 280 Q284 340 200 356 Q116 340 116 280 Z" fill="none" stroke="#0a0a0c" stroke-width="8"/>
  <!-- Speaker grille area (front face fabric) -->
  <path d="M132 130 Q130 95 156 78 Q176 64 200 64 Q224 64 244 78 Q270 95 268 130 L268 270 Q268 320 200 334 Q132 320 132 270 Z" fill="url(#grille)"/>
  <!-- Grille dots pattern -->
  <g fill="rgba(255,255,255,0.06)">
    <circle cx="155" cy="120" r="2"/><circle cx="165" cy="120" r="2"/><circle cx="175" cy="120" r="2"/>
    <circle cx="185" cy="120" r="2"/><circle cx="195" cy="120" r="2"/><circle cx="205" cy="120" r="2"/>
    <circle cx="215" cy="120" r="2"/><circle cx="225" cy="120" r="2"/><circle cx="235" cy="120" r="2"/><circle cx="245" cy="120" r="2"/>
    <circle cx="150" cy="130" r="2"/><circle cx="160" cy="130" r="2"/><circle cx="170" cy="130" r="2"/>
    <circle cx="180" cy="130" r="2"/><circle cx="190" cy="130" r="2"/><circle cx="200" cy="130" r="2"/>
    <circle cx="210" cy="130" r="2"/><circle cx="220" cy="130" r="2"/><circle cx="230" cy="130" r="2"/><circle cx="240" cy="130" r="2"/><circle cx="250" cy="130" r="2"/>
    <circle cx="150" cy="140" r="2"/><circle cx="160" cy="140" r="2"/><circle cx="170" cy="140" r="2"/>
    <circle cx="180" cy="140" r="2"/><circle cx="190" cy="140" r="2"/><circle cx="200" cy="140" r="2"/>
    <circle cx="210" cy="140" r="2"/><circle cx="220" cy="140" r="2"/><circle cx="230" cy="140" r="2"/><circle cx="240" cy="140" r="2"/><circle cx="250" cy="140" r="2"/>
    <circle cx="148" cy="160" r="2"/><circle cx="158" cy="160" r="2"/><circle cx="168" cy="160" r="2"/>
    <circle cx="178" cy="160" r="2"/><circle cx="188" cy="160" r="2"/><circle cx="198" cy="160" r="2"/>
    <circle cx="208" cy="160" r="2"/><circle cx="218" cy="160" r="2"/><circle cx="228" cy="160" r="2"/><circle cx="238" cy="160" r="2"/><circle cx="248" cy="160" r="2"/>
    <circle cx="148" cy="180" r="2"/><circle cx="158" cy="180" r="2"/><circle cx="168" cy="180" r="2"/>
    <circle cx="178" cy="180" r="2"/><circle cx="188" cy="180" r="2"/><circle cx="198" cy="180" r="2"/>
    <circle cx="208" cy="180" r="2"/><circle cx="218" cy="180" r="2"/><circle cx="228" cy="180" r="2"/><circle cx="238" cy="180" r="2"/><circle cx="248" cy="180" r="2"/>
    <circle cx="148" cy="200" r="2"/><circle cx="158" cy="200" r="2"/><circle cx="168" cy="200" r="2"/>
    <circle cx="178" cy="200" r="2"/><circle cx="188" cy="200" r="2"/><circle cx="198" cy="200" r="2"/>
    <circle cx="208" cy="200" r="2"/><circle cx="218" cy="200" r="2"/><circle cx="228" cy="200" r="2"/><circle cx="238" cy="200" r="2"/><circle cx="248" cy="200" r="2"/>
    <circle cx="148" cy="220" r="2"/><circle cx="158" cy="220" r="2"/><circle cx="168" cy="220" r="2"/>
    <circle cx="178" cy="220" r="2"/><circle cx="188" cy="220" r="2"/><circle cx="198" cy="220" r="2"/>
    <circle cx="208" cy="220" r="2"/><circle cx="218" cy="220" r="2"/><circle cx="228" cy="220" r="2"/><circle cx="238" cy="220" r="2"/><circle cx="248" cy="220" r="2"/>
  </g>
  <!-- Bose logo -->
  <text x="200" y="268" font-size="16" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="sans-serif" font-weight="bold" letter-spacing="2">BOSE</text>
  <!-- Wrist loop/strap at top -->
  <path d="M180 46 Q200 36 220 46" fill="none" stroke="#1a1a1c" stroke-width="8" stroke-linecap="round"/>
  <path d="M186 44 Q200 34 214 44" fill="none" stroke="#333335" stroke-width="4" stroke-linecap="round"/>
  <!-- Buttons on right edge -->
  <rect x="278" y="140" width="9" height="18" rx="4.5" fill="#222224"/>
  <rect x="278" y="166" width="9" height="18" rx="4.5" fill="#222224"/>
  <rect x="278" y="192" width="9" height="18" rx="4.5" fill="#222224"/>
  <!-- USB-C port (waterproof, bottom) -->
  <rect x="191" y="348" width="18" height="7" rx="3.5" fill="#111"/>
  <!-- PositionIQ sensor (visible bottom corner) -->
  <circle cx="145" cy="330" r="6" fill="#1a1a1c"/>
  <!-- IP67 label -->
  <text x="164" y="338" font-size="8" fill="rgba(255,255,255,0.35)" font-family="sans-serif">IP67</text>
  <!-- Body highlight -->
  <path d="M132 130 Q134 88 156 72 Q175 58 200 56 Q200 80 178 96 Q155 112 132 110 Z" fill="url(#shine)"/>
</svg>
