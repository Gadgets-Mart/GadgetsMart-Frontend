<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1d3557"/>
    </linearGradient>
    <linearGradient id="cup" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3050"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Headband outer arc -->
  <path d="M 90 270 C 90 120 310 120 310 270" stroke="#00bcd4" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Headband padding -->
  <path d="M 112 238 C 112 135 288 135 288 238" stroke="#1e3050" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 112 238 C 112 135 288 135 288 238" stroke="#00bcd4" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- Left ear cup outer -->
  <ellipse cx="90" cy="282" rx="46" ry="56" fill="url(#cup)" stroke="#00bcd4" stroke-width="2.5"/>
  <!-- Left cushion ring -->
  <ellipse cx="90" cy="282" rx="35" ry="43" fill="none" stroke="#00bcd4" stroke-width="1.5" opacity="0.5"/>
  <!-- Left driver mesh -->
  <ellipse cx="90" cy="282" rx="24" ry="30" fill="#060e1a"/>
  <circle cx="90" cy="282" r="8" fill="#00bcd4" opacity="0.25"/>
  <circle cx="90" cy="282" r="4" fill="#00bcd4" opacity="0.4"/>
  <!-- Right ear cup outer -->
  <ellipse cx="310" cy="282" rx="46" ry="56" fill="url(#cup)" stroke="#00bcd4" stroke-width="2.5"/>
  <!-- Right cushion ring -->
  <ellipse cx="310" cy="282" rx="35" ry="43" fill="none" stroke="#00bcd4" stroke-width="1.5" opacity="0.5"/>
  <!-- Right driver mesh -->
  <ellipse cx="310" cy="282" rx="24" ry="30" fill="#060e1a"/>
  <circle cx="310" cy="282" r="8" fill="#00bcd4" opacity="0.25"/>
  <circle cx="310" cy="282" r="4" fill="#00bcd4" opacity="0.4"/>
  <!-- Left control buttons -->
  <rect x="118" y="268" width="10" height="7" rx="3.5" fill="#00bcd4" opacity="0.5"/>
  <rect x="118" y="280" width="10" height="7" rx="3.5" fill="#00bcd4" opacity="0.3"/>
  <!-- Right USB-C port -->
  <rect x="272" y="290" width="12" height="5" rx="2" fill="#00bcd4" opacity="0.4"/>
  <!-- ANC indicator light -->
  <circle cx="133" cy="260" r="3" fill="#00bcd4" opacity="0.8"/>
  <!-- Label -->
  <text x="200" y="370" font-family="Arial,sans-serif" font-weight="700" font-size="16" fill="#00bcd4" text-anchor="middle" letter-spacing="2">HEADPHONES</text>
  <text x="200" y="390" font-family="Arial,sans-serif" font-size="11" fill="#4a8fa5" text-anchor="middle">Active Noise Cancellation</text>
</svg>
