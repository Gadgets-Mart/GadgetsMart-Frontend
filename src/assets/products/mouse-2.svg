<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="100%" stop-color="#1a0505"/>
    </linearGradient>
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a0505"/>
      <stop offset="100%" stop-color="#100000"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Mouse shadow -->
  <ellipse cx="202" cy="295" rx="80" ry="14" fill="#000" opacity="0.45"/>
  <!-- Mouse body - more angular gaming shape -->
  <path d="M 200 75 C 142 75 126 125 122 185 C 118 235 132 282 158 293 C 175 300 225 300 242 293 C 268 282 282 235 278 185 C 274 125 258 75 200 75 Z" fill="url(#body-grad)" stroke="#ff3333" stroke-width="2.5"/>
  <!-- RGB underglow effect -->
  <path d="M 158 293 C 175 300 225 300 242 293" stroke="#ff0000" stroke-width="4" fill="none" opacity="0.6"/>
  <!-- Left/right button divider -->
  <line x1="200" y1="80" x2="200" y2="195" stroke="#ff3333" stroke-width="1.5" opacity="0.6"/>
  <!-- Button curve -->
  <path d="M 122 195 C 148 208 172 213 200 213 C 228 213 252 208 278 195" stroke="#ff3333" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Scroll wheel -->
  <rect x="186" y="130" width="28" height="58" rx="14" fill="#100000" stroke="#ff3333" stroke-width="1.5"/>
  <!-- RGB scroll wheel glow -->
  <rect x="189" y="140" width="22" height="5" rx="2.5" fill="#ff3333" opacity="0.8"/>
  <rect x="189" y="150" width="22" height="5" rx="2.5" fill="#ff6600" opacity="0.7"/>
  <rect x="189" y="160" width="22" height="5" rx="2.5" fill="#ffcc00" opacity="0.6"/>
  <rect x="189" y="170" width="22" height="5" rx="2.5" fill="#ff3333" opacity="0.5"/>
  <!-- Side buttons -->
  <rect x="118" y="190" width="10" height="18" rx="3" fill="#1a0505" stroke="#ff3333" stroke-width="1"/>
  <rect x="118" y="213" width="10" height="18" rx="3" fill="#1a0505" stroke="#ff3333" stroke-width="1"/>
  <!-- Razer logo area -->
  <polygon points="200,250 208,264 200,260 192,264" fill="#ff3333" opacity="0.7"/>
  <text x="200" y="360" font-family="Arial,sans-serif" font-weight="700" font-size="18" fill="#ff3333" text-anchor="middle" letter-spacing="3">MOUSE</text>
  <text x="200" y="382" font-family="Arial,sans-serif" font-size="11" fill="#aa2222" text-anchor="middle">30K DPI · Gaming</text>
</svg>
